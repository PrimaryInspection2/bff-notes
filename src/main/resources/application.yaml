spring:
  profiles:
    active: ${SPRING_PROFILE_ACTIVE}
  application:
    name: bff-notes

server:
  port: 9004
  servlet:
    context-path: /bff-notes

management:
  tracing:
    sampling:
      probability: 1.0
    export:
      zipkin:
        endpoint: http://zipkin.notes-app.svc.cluster.local:9411/api/v2/spans
  server:
    port: 9192
  endpoints:
    web:
      exposure:
        include: info, health, metrics, loggers, monitoring, prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

logging:
  level:
    com.saveit: ${LOGGING_LEVEL_APP:ERROR}
    org.springframework: ${LOGGING_LEVEL_SPRING:ERROR}

saveit:
  notes-service:
    url: ${NOTES_SERVICE_URL}
