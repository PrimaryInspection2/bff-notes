apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bff-notes-main-ingress
  namespace: notes-app
  annotations:
    kubernetes.io/ingress.class: "gce"
spec:
  rules:
    - http:
        paths:
          - path: /bff-notes/*
            pathType: ImplementationSpecific
            backend:
              service:
                name: bff-notes
                port:
                  number: 9004