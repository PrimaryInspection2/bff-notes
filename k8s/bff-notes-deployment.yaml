apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff-notes
  namespace: notes-app
  labels:
    app: bff-notes
spec:
  selector:
    matchLabels:
      app: bff-notes
  template:
    metadata:
      labels:
        app: bff-notes
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "9192"
    spec:
      containers:
        - name: bff-notes
          # use specific image tag, never use 'latest' in production
          image: andreyjava404/bff-notes:4.0.2-bb85aea
          # always pull from registry to ensure latest tag is used
          imagePullPolicy: Always
          ports:
            - name: svc-port
              containerPort: 9004
            - name: admin
              containerPort: 9192
          env:
            # non-sensitive config from ConfigMap
            - name: SPRING_PROFILE_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: bff-notes-config
                  key: SPRING_PROFILE_ACTIVE
            - name: LOGGING_LEVEL_APP
              valueFrom:
                configMapKeyRef:
                  name: bff-notes-config
                  key: LOGGING_LEVEL_APP
            - name: LOGGING_LEVEL_SPRING
              valueFrom:
                configMapKeyRef:
                  name: bff-notes-config
                  key: LOGGING_LEVEL_SPRING
            - name: NOTES_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: bff-notes-config
                  key: NOTES_SERVICE_URL
          # startup probe — blocks liveness/readiness until app is ready; prevents premature restarts during slow startup
          startupProbe:
            httpGet:
              path: /actuator/health/liveness  # spring boot actuator health endpoint
              port: 9192              # management port, separate from app port
            failureThreshold: 30      # allow up to 30 failures before killing container (30 * 10s = 300s max startup time)
            periodSeconds: 10         # check every 10 seconds
            timeoutSeconds: 5         # fail if no response within 5 seconds

          # liveness probe — restarts container if app is unhealthy; only runs after startupProbe passes
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 9192
            periodSeconds: 30         # check every 30 seconds (less frequent — just detects deadlocks/crashes)
            timeoutSeconds: 10        # more lenient timeout — app under load may respond slowly
            failureThreshold: 3       # restart after 3 consecutive failures (3 * 30s = 90s before restart)

          # readiness probe — removes pod from load balancer if not ready to serve traffic; only runs after startupProbe passes
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 9192
            periodSeconds: 10         # check every 10 seconds (more frequent — affects live traffic routing)
            timeoutSeconds: 5         # stricter timeout — unresponsive pod should stop receiving traffic quickly
            failureThreshold: 3       # remove from load balancer after 3 consecutive failures (3 * 10s = 30s)
          # resource limits — important for Autopilot
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      restartPolicy: Always